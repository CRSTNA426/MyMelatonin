<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0f1a">

    <!-- === PWA: Web App Manifest === -->
    <link rel="manifest" href="manifest.json">

    <!-- === PWA: iOS Safari 支持（独立模式、状态栏样式） === -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Melatonin">
    <!-- iOS 主屏图标 —— 优先使用 SVG，iOS 17+ 支持 -->
    <link rel="apple-touch-icon" href="icon.svg">
    <!-- 旧版 iOS 的 180x180 PNG 后备（此处复用 SVG，Safari 会自动缩放渲染） -->

    <title>你的电子褪黑素 | Your Electrical Melatonin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Cormorant+Garamond:ital,wght@1,300&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           CSS Custom Properties — 沉浸式暗色主题
           ============================================ */
        :root {
            --bg-deep:    #0a0f1a;
            --bg-primary: #0d1525;
            --bg-surface: rgba(255, 255, 255, 0.03);
            --bg-hover:   rgba(255, 255, 255, 0.07);
            --text-primary: rgba(255, 255, 255, 0.90);
            --text-dim:     rgba(255, 255, 255, 0.50);
            --text-faint:   rgba(255, 255, 255, 0.22);
            --accent-purple: #7c5cbf;
            --accent-blue:   #5b8def;
            --accent-warm:   #bfa07c;
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-medium: rgba(255, 255, 255, 0.10);
            --glass-bg:      rgba(10, 15, 26, 0.75);
            --glass-border:  rgba(255, 255, 255, 0.08);
            --danger:        #e0556a;
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-full: 50%;
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-slow: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            --z-canvas:  0;
            --z-content: 10;
            --z-nav:     100;
            --z-bar:     1000;
            --z-overlay: 2000;
        }

        /* ============================================
           Reset & Base
           ============================================ */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body, html {
            width: 100%; height: 100%;
            background: var(--bg-deep);
            color: var(--text-primary);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 300;
            overflow: hidden;
            position: fixed;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* ---- 背景粒子画布 ---- */
        #particles {
            position: fixed; inset: 0; z-index: var(--z-canvas);
            pointer-events: none;
            opacity: 0.6;
        }

        /* ---- 渐变光晕背景层 ---- */
        .bg-ambient {
            position: fixed; z-index: calc(var(--z-canvas) + 1); pointer-events: none;
            width: 600px; height: 600px; border-radius: 50%;
            filter: blur(180px); opacity: 0.08;
            transition: transform 8s ease-in-out, opacity 4s ease;
        }
        .bg-ambient.a1 {
            top: -200px; left: -100px;
            background: var(--accent-purple);
            animation: ambientDrift1 20s infinite ease-in-out;
        }
        .bg-ambient.a2 {
            bottom: -200px; right: -100px;
            background: var(--accent-blue);
            animation: ambientDrift2 25s infinite ease-in-out;
        }

        @keyframes ambientDrift1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(60px, 40px) scale(1.15); }
            66%      { transform: translate(-30px, -20px) scale(0.9); }
        }
        @keyframes ambientDrift2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(-50px, -30px) scale(1.1); }
            66%      { transform: translate(40px, 50px) scale(0.85); }
        }

        /* ============================================
           Navigation
           ============================================ */
        .nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: var(--z-nav);
            display: flex; justify-content: space-between; align-items: center;
            padding: 16px 24px;
            pointer-events: none;
        }
        .nav > * { pointer-events: auto; }

        .nav-btn {
            font-size: 13px; font-family: inherit; font-weight: 400;
            color: var(--text-dim); background: none; border: none;
            cursor: pointer; padding: 8px 14px;
            border-radius: 20px;
            transition: color var(--transition-fast), background var(--transition-fast);
            letter-spacing: 0.5px;
        }
        .nav-btn:hover { color: var(--text-primary); background: var(--bg-surface); }

        .back-btn {
            display: none;
            font-size: 13px;
        }

        .lang-btn {
            border: 1px solid var(--border-medium);
            font-size: 12px; padding: 6px 14px;
        }

        /* ============================================
           View Containers — 统一过渡
           ============================================ */
        .view {
            position: fixed; inset: 0; z-index: var(--z-content);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
            padding: 20px;
        }
        .view.active { opacity: 1; pointer-events: auto; }

        /* ---- 首页 ---- */
        .home-title {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 500;
            letter-spacing: 0.15em;
            text-align: center;
            line-height: 1.4;
            animation: fadeInUp 0.8s ease both;
        }
        .home-slogan {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-style: italic;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            color: var(--text-dim);
            margin: 16px 0 56px 0;
            max-width: 80%;
            text-align: center;
            letter-spacing: 0.04em;
            animation: fadeInUp 0.8s 0.15s ease both;
        }

        .card-group {
            display: flex; gap: 32px;
            animation: fadeInUp 0.8s 0.3s ease both;
        }

        .card {
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            padding: 32px 40px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: transform var(--transition-fast), background var(--transition-fast),
                        border-color var(--transition-fast), box-shadow var(--transition-fast);
            position: relative; overflow: hidden;
        }
        .card::after {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at center, rgba(124,92,191,0.08) 0%, transparent 70%);
            opacity: 0; transition: opacity var(--transition-slow);
        }
        .card:hover {
            transform: translateY(-6px);
            background: var(--bg-hover);
            border-color: var(--border-medium);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 40px rgba(124,92,191,0.06);
        }
        .card:hover::after { opacity: 1; }
        .card:active { transform: translateY(-2px); }

        .card-icon {
            font-size: 2.2rem;
            position: relative; z-index: 1;
            transition: transform var(--transition-fast);
        }
        .card:hover .card-icon { transform: scale(1.15); }

        .card-label {
            font-size: 1rem; font-weight: 400;
            color: var(--text-primary);
            letter-spacing: 0.06em;
            position: relative; z-index: 1;
        }

        /* ---- 列表页 ---- */
        .list-view {
            justify-content: flex-start;
            padding-top: 80px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .list-title {
            font-size: 1.3rem; font-weight: 300; letter-spacing: 0.08em;
            margin-bottom: 8px; text-align: center;
        }
        .list-subtitle {
            font-size: 12px; color: var(--text-faint);
            margin-bottom: 24px; text-align: center;
            letter-spacing: 0.04em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
            width: 100%; max-width: 960px;
            padding-bottom: 140px;
        }

        .track-item {
            display: flex; align-items: center; gap: 12px;
            padding: 14px 18px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: background var(--transition-fast), border-color var(--transition-fast),
                        transform var(--transition-fast);
        }
        .track-item:hover {
            background: var(--bg-hover);
            border-color: var(--border-medium);
            transform: translateX(4px);
        }
        .track-item:active { transform: scale(0.98); }
        .track-item.playing {
            border-color: var(--accent-purple);
            background: rgba(124,92,191,0.08);
            box-shadow: 0 0 20px rgba(124,92,191,0.08);
        }

        .track-icon {
            font-size: 1.1rem; flex-shrink: 0;
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border-radius: var(--radius-full);
            background: rgba(255,255,255,0.04);
        }
        .track-name {
            flex: 1; font-size: 14px; font-weight: 400;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* ---- 播放模式切换 ---- */
        .mode-toggle {
            display: flex; gap: 2px;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 20px;
            padding: 3px;
            margin-bottom: 24px;
        }
        .mode-btn {
            font-size: 12px; font-family: inherit;
            padding: 6px 16px;
            border: none; background: transparent;
            color: var(--text-dim); cursor: pointer;
            border-radius: 18px;
            transition: all var(--transition-fast);
            letter-spacing: 0.04em;
        }
        .mode-btn.active {
            background: var(--bg-hover);
            color: var(--text-primary);
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        .mode-btn:hover:not(.active) { color: var(--text-primary); }

        /* ---- 播放器页 ---- */
        .player-view {
            gap: 0;
        }

        .halo-container {
            position: relative; display: flex; align-items: center; justify-content: center;
        }

        .halo {
            width: 240px; height: 240px; border-radius: var(--radius-full);
            border: 1px solid rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
            animation: breathe 8s infinite ease-in-out;
            animation-play-state: paused;
            position: relative;
        }
        .halo::before {
            content: ''; position: absolute;
            width: 200px; height: 200px; border-radius: var(--radius-full);
            border: 1px solid rgba(255,255,255,0.04);
            animation: breathe 8s 2s infinite ease-in-out;
            animation-play-state: inherit;
        }
        .halo::after {
            content: ''; position: absolute;
            width: 280px; height: 280px; border-radius: var(--radius-full);
            border: 1px solid rgba(124,92,191,0.06);
            animation: breathe 8s 4s infinite ease-in-out;
            animation-play-state: inherit;
        }

        @keyframes breathe {
            0%, 100% { transform: scale(1);   opacity: 0.25; box-shadow: 0 0 60px rgba(124,92,191,0.04); }
            50%      { transform: scale(1.12); opacity: 0.55; box-shadow: 0 0 120px rgba(124,92,191,0.10); }
        }

        .halo-inner {
            font-size: 14px; color: var(--text-dim);
            text-align: center; padding: 20px;
            max-width: 160px;
            line-height: 1.5;
            animation: fadeInUp 1s ease both;
        }

        /* ---- 加载骨架 ---- */
        .loading-indicator {
            display: flex; align-items: center; justify-content: center; gap: 6px;
            padding: 40px;
        }
        .loading-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--text-dim);
            animation: dotPulse 1.2s infinite ease-in-out;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.15s; }
        .loading-dot:nth-child(3) { animation-delay: 0.3s; }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50%      { opacity: 1;   transform: scale(1.4); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* ============================================
           控制栏（毛玻璃）
           ============================================ */
        .control-bar {
            position: fixed; bottom: 0; left: 0; right: 0; z-index: var(--z-bar);
            height: 90px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--glass-border);
            display: none; align-items: center; justify-content: space-between;
            padding: 0 24px;
            animation: slideUp 0.4s ease both;
        }
        .control-bar.visible { display: flex; }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to   { transform: translateY(0); }
        }

        .bar-left {
            display: flex; align-items: center; gap: 14px;
            min-width: 0; flex: 1;
        }
        .bar-right {
            display: flex; align-items: center; gap: 12px;
            flex-shrink: 0;
        }

        .play-btn {
            font-size: 26px; cursor: pointer;
            width: 42px; height: 42px;
            display: flex; align-items: center; justify-content: center;
            border-radius: var(--radius-full);
            background: none; border: none; color: var(--text-primary);
            transition: background var(--transition-fast), transform var(--transition-fast);
            flex-shrink: 0;
        }
        .play-btn:hover { background: var(--bg-surface); }
        .play-btn:active { transform: scale(0.9); }

        .track-info {
            min-width: 0; display: flex; flex-direction: column; gap: 2px;
        }
        .track-title {
            font-size: 13px; font-weight: 400;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .track-meta {
            font-size: 11px; color: var(--text-faint);
        }

        .bar-ctrl {
            font-size: 12px; cursor: pointer;
            padding: 6px 10px; border-radius: 16px;
            background: none; border: 1px solid var(--border-subtle);
            color: var(--text-dim);
            transition: all var(--transition-fast);
            white-space: nowrap;
            font-family: inherit;
        }
        .bar-ctrl:hover { border-color: var(--border-medium); color: var(--text-primary); }
        .bar-ctrl.active {
            border-color: var(--accent-purple);
            color: var(--accent-purple);
            background: rgba(124,92,191,0.1);
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 80px; height: 3px;
            background: rgba(255,255,255,0.12);
            border-radius: 3px;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--text-primary);
            border: 2px solid var(--bg-primary);
            cursor: pointer;
            transition: transform var(--transition-fast);
        }
        .volume-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

        /* ============================================
           过渡层（Overlay）
           ============================================ */
        #overlay {
            position: fixed; inset: 0; z-index: var(--z-overlay);
            background: var(--bg-deep);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.5s ease;
        }
        #overlay.show { opacity: 1; pointer-events: auto; }

        .overlay-glow {
            width: 160px; height: 160px;
            background: radial-gradient(circle, rgba(124,92,191,0.3) 0%, transparent 70%);
            border-radius: 50%;
            animation: overlayPulse 1.5s infinite ease-in-out;
        }
        @keyframes overlayPulse {
            0%, 100% { transform: scale(0.8); opacity: 0.4; }
            50%      { transform: scale(1.3); opacity: 0.9; }
        }

        .overlay-text {
            position: absolute; font-size: 1rem; font-weight: 300;
            letter-spacing: 0.1em; color: var(--text-dim);
        }

        /* ---- 错误 / 空状态 ---- */
        .toast {
            position: fixed; bottom: 120px; left: 50%; transform: translateX(-50%);
            z-index: calc(var(--z-bar) + 1);
            padding: 10px 22px; border-radius: 20px;
            font-size: 13px;
            background: rgba(224,85,106,0.9);
            color: #fff;
            opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .toast.show { opacity: 1; }

        /* ---- iOS 提示 ---- */
        #ios-hint {
            font-size: 10px; color: var(--text-faint);
            display: none; margin-top: 4px;
        }

        /* ---- 进度条 ---- */
        .progress-container {
            position: absolute; top: -4px; left: 0; right: 0; height: 4px;
            cursor: pointer;
            background: rgba(255,255,255,0.06);
            transition: height var(--transition-fast);
        }
        .progress-container:hover { height: 8px; }
        .progress-bg {
            position: relative; width: 100%; height: 100%;
            overflow: hidden;
        }
        .progress-fill {
            position: absolute; top: 0; left: 0; height: 100%;
            background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
            width: 0%;
            border-radius: 0 2px 2px 0;
            transition: width 0.1s linear;
            pointer-events: none;
        }
        .progress-buffered {
            position: absolute; top: 0; left: 0; height: 100%;
            background: rgba(255,255,255,0.08);
            width: 0%;
            pointer-events: none;
        }
        .progress-hover-time {
            position: absolute; top: -28px;
            font-size: 11px; color: var(--text-primary);
            background: rgba(0,0,0,0.8); padding: 2px 8px; border-radius: 10px;
            opacity: 0; pointer-events: none;
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .time-display {
            display: flex; gap: 8px; align-items: center;
            font-size: 11px; color: var(--text-faint);
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'Consolas', 'Menlo', monospace;
            margin-top: 3px;
        }

        /* ---- 睡眠定时器 ---- */
        .timer-btn {
            position: relative;
            font-size: 12px; cursor: pointer;
            padding: 6px 12px; border-radius: 16px;
            background: none; border: 1px solid var(--border-subtle);
            color: var(--text-dim);
            transition: all var(--transition-fast);
            white-space: nowrap;
            font-family: inherit;
            min-width: 52px; text-align: center;
        }
        .timer-btn:hover { border-color: var(--border-medium); color: var(--text-primary); }
        .timer-btn.active {
            border-color: var(--accent-warm);
            color: var(--accent-warm);
            background: rgba(191,160,124,0.08);
        }

        .timer-popover {
            position: absolute; bottom: 100%; right: 0;
            margin-bottom: 12px;
            background: rgba(20, 25, 40, 0.96);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-md);
            padding: 8px;
            display: none; flex-direction: column; gap: 2px;
            min-width: 130px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.6);
            z-index: 10;
        }
        .timer-popover.show { display: flex; }

        .timer-option {
            font-size: 13px; padding: 10px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer; color: var(--text-dim);
            transition: all var(--transition-fast);
            text-align: center; font-family: inherit;
            background: none; border: none;
            white-space: nowrap;
        }
        .timer-option:hover { background: var(--bg-hover); color: var(--text-primary); }
        .timer-option.active {
            color: var(--accent-warm);
            background: rgba(191,160,124,0.1);
        }

        /* ---- 定时器结束提示 ---- */
        .timer-done-overlay {
            position: fixed; inset: 0; z-index: 3000;
            background: rgba(0,0,0,0.7);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none;
            transition: opacity 0.8s ease;
        }
        .timer-done-overlay.show { opacity: 1; }

        .timer-done-card {
            text-align: center; padding: 40px;
        }
        .timer-done-icon {
            font-size: 3rem; margin-bottom: 16px;
            animation: fadeInUp 0.6s ease both;
        }
        .timer-done-text {
            font-size: 1.1rem; font-weight: 300;
            letter-spacing: 0.06em;
            color: var(--text-primary);
            animation: fadeInUp 0.6s 0.2s ease both;
        }
        .timer-done-sub {
            font-size: 13px; color: var(--text-dim);
            margin-top: 8px;
            animation: fadeInUp 0.6s 0.35s ease both;
        }

        /* ============================================
           响应式
           ============================================ */
        /* ---- 手机竖屏 ---- */
        @media (max-width: 640px) {
            .card-group {
                flex-direction: column; gap: 16px; width: 100%; max-width: 320px;
            }
            .card {
                flex-direction: row; padding: 18px 24px; gap: 14px;
                justify-content: center;
            }
            .card-icon { font-size: 1.6rem; }
            .card-label { font-size: 0.95rem; }

            .grid {
                grid-template-columns: 1fr;
                max-width: 100%;
            }

            .halo { width: 200px; height: 200px; }
            .halo::before { width: 160px; height: 160px; }
            .halo::after  { width: 240px; height: 240px; }

            .control-bar {
                height: auto; min-height: 72px;
                padding: 10px 14px;
                flex-wrap: wrap; gap: 8px;
            }
            .bar-left { flex: 2; min-width: 0; }
            .bar-right { flex: 1; gap: 6px; justify-content: flex-end; }
            .volume-slider { width: 50px; }
            .timer-btn { font-size: 11px; padding: 5px 8px; min-width: 44px; }

            .nav { padding: 12px 16px; }
            .home-title { letter-spacing: 0.08em; }
            .home-slogan { margin-bottom: 40px; }

            .track-meta { display: none; }
        }

        /* ---- 超小屏 ---- */
        @media (max-width: 380px) {
            .track-item { padding: 12px 14px; gap: 8px; }
            .track-name { font-size: 13px; }
            .mode-btn { font-size: 11px; padding: 5px 12px; }

            },
            save() {
                try { localStorage.setItem(STORE_KEY, JSON.stringify(this._data)); } catch {}
            },
            get(key, fallback) {
                return (key in this._data) ? this._data[key] : fallback;
            },
            set(key, val) {
                this._data[key] = val;
                this.save();
            }
        };
        store.load();

        // ---- 状态（从 localStorage 恢复偏好） ----
        let curLang = store.get('lang', 'zh');
        let curType = store.get('type', '');

        let playMode = store.get('playMode', 'sequential');

        const ADMIN_PASSWORD = 'melatonin2024'; // ★ 站长密码修改处 —— 改这里即可
        let adminActiveTab = 'asmr';            // 当前管理标签页

            // iPhone / iPod / 旧 iPad
            const isLegacyIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            return isIPadOS || isLegacyIOS;
        })();

        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;

        // ---- 双语数据 ----
        const ui = {

        /* === PWA: 音频数据 —— 优先从 tracks.json 加载，失败则用内置兜底 ===

        let db = { asmr: [], nature: [] };

        /* === PWA: 异步加载 tracks.json === */
        async function loadTracks() {
            try {
                const resp = await fetch('./tracks.json');
                if (!resp.ok) throw new Error('HTTP ' + resp.status);
                const data = await resp.json();
                if (data.asmr && data.asmr.length && data.nature && data.nature.length) {

            } catch (err) {
                console.warn('[PWA] ⚠ tracks.json 加载失败: ' + err.message + '，降级为兜底数据');
                db = FALLBACK_DB;
                console.log('[PWA] 📦 使用内置兜底数据 (ASMR: ' + FALLBACK_DB.asmr.length + ' 首, Nature: ' + FALLBACK_DB.nature.length + ' 首)');
            }
        }

        function t(key) { return ui[curLang][key] || key; }
        function trackName(track) { return curLang === 'zh' ? track.zh : track.en; }

        // ---- DOM 引用 ----
        const $ = (s) => document.querySelector(s);
        const $$ = (s) => document.querySelectorAll(s);

        /* ADMIN: HTML 转义 —— 防止 XSS & 渲染破损 */
        function escapeHTML(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
        function escapeAttr(str) {
            return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        const domHome    = $('#view-home');

        const domProgressHover = $('#progress-hover-time');

        const domTimeCurrent = $('#time-current');
        const domTimeDuration = $('#time-duration');
        const domTimerBtn = $('#timer-btn');

        const domAdminLoginInput  = $('#admin-login-input');
        const domAdminLoginError  = $('#admin-login-error');
        const domAdminExportOut   = $('#admin-export-output');
        const domAdminExportHint  = $('#admin-export-hint');
        const domAdminEntryBtn    = $('#admin-entry-btn');

        // ---- 视图切换（无 location.reload） ----
        function showView(name) {
            currentView = name;
            [domHome, domList, domPlayer, domAdminView].forEach(v => v.classList.remove('active'));
            if (name === 'home') {
                domHome.classList.add('active');
                domBack.style.display = 'none';
                domBar.classList.remove('visible');
                domAdminEntryBtn.style.display = ''; // ADMIN: 首页显示入口
            } else if (name === 'list') {
                domList.classList.add('active');
                domBack.style.display = 'block';
                if (!curTrack || player.paused) domBar.classList.remove('visible');
                domAdminEntryBtn.style.display = 'none'; // ADMIN: 列表页隐藏入口
            } else if (name === 'player') {
                domPlayer.classList.add('active');
                domBack.style.display = 'block';
                domBar.classList.add('visible');
                domAdminEntryBtn.style.display = 'none'; // ADMIN: 播放器隐藏入口
            } else if (name === 'admin') {
                domAdminView.classList.add('active');
                domBack.style.display = 'none';
                domBar.classList.remove('visible');
                domAdminEntryBtn.style.display = 'none'; // ADMIN: 管理页隐藏入口
            }
        }

        // ---- 过渡动画（~1.2s） ----
        function showOverlay(text, duration = 1200) {
            return new Promise(resolve => {
                const ovText = $('#overlay-text');
                ovText.innerText = text;
                domOverlay.classList.add('show');
                setTimeout(() => {
                    domOverlay.style.opacity = '0';
                    setTimeout(() => {
                        domOverlay.classList.remove('show');
                        domOverlay.style.opacity = '';
                        resolve();
                    }, 500); // CSS transition 0.5s
                }, duration);
            });
        }

        // ---- Toast 提示 ----
        let toastTimer;
        function toast(msg) {
            domToast.innerText = msg;
            domToast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => domToast.classList.remove('show'), 2500);
        }

        // ---- 列表渲染 ----
        function renderList() {
            const list = db[curType];
            domGrid.innerHTML = '';

            list.forEach((item, idx) => {
                const el = document.createElement('div');
                el.className = 'track-item';
                if (curTrack && curTrack.p === item.p && !player.paused) {
                    el.classList.add('playing');
                }
                el.innerHTML = `
                    <span class="track-icon">${curTrack && curTrack.p === item.p && !player.paused ? '⏸' : '▶'}</span>
                    <span class="track-name">${trackName(item)}</span>
                `;
                el.addEventListener('click', () => startTrack(item));
                domGrid.appendChild(el);
            });

            // 更新模式切换按钮
            $$('#mode-toggle .mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === playMode);
            });
        }

        function refreshListPlayingState() {
            const items = domGrid.querySelectorAll('.track-item');
            const list = db[curType];
            items.forEach((el, idx) => {
                const item = list[idx];
                if (!item) return;
                const isCurrent = curTrack && curTrack.p === item.p && !player.paused;
                el.classList.toggle('playing', isCurrent);
                const icon = el.querySelector('.track-icon');
                if (icon) icon.textContent = isCurrent ? '⏸' : '▶';
            });
        }

        // ---- 入场：首页 -> 过渡 -> 列表 ----
        async function enter(type) {
            curType = type;
            const label = type === 'asmr' ? t('asmr') : t('nature');
            domHome.style.opacity = '0';
            await sleep(400);
            domHome.classList.remove('active');
            await showOverlay(label, 800);
            $('#list-title').innerText = label;
            $('#list-subtitle').innerText = t('listSubtitle');
            showView('list');
            renderList();
        }

        function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

        // ---- 返回（纯视图切换） ----
        function back() {
            if (currentView === 'player') {
                // 回到列表，不停止播放
                showView('list');
                renderList();
                if (curTrack && !player.paused) {
                    domBar.classList.add('visible');
                }
                $('#list-title').innerText = curType === 'asmr' ? t('asmr') : t('nature');
            } else if (currentView === 'list') {
                // 回到首页
                showView('home');
                domHome.style.opacity = '1';
            }
        }

        // ---- 播放模式切换 ----
        function setPlayMode(mode) {
            playMode = mode;
            lastRandomIndex = -1;
            store.set('playMode', mode);
            $$('#mode-toggle .mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
        }

        // ---- 获取下一首 ----
        function getNextTrack() {
            const list = db[curType];
            if (list.length === 0) return null;

            if (playMode === 'sequential') {
                if (!curTrack) return list[0];
                const curIdx = list.findIndex(t => t.p === curTrack.p);
                const nextIdx = (curIdx + 1) % list.length;
                return list[nextIdx];
            } else {
                // 随机模式：避免与上一首重复
                let idx;
                do {
                    idx = Math.floor(Math.random() * list.length);
                } while (idx === lastRandomIndex && list.length > 1);
                lastRandomIndex = idx;
                return list[idx];
            }
        }

        // ---- 播放曲目 ----
        async function startTrack(track) {
            if (!track) return;

            const prevSrc = player.src;

            // 设置加载状态
            updateHaloText(t('loading'), false);
            if (currentView !== 'player') {
                showView('player');
            }

            player.pause();
            player.src = track.p;
            curTrack = track;
            playerReady = false;

            try {
                player.load();
                const playPromise = player.play();

                if (playPromise !== undefined) {
                    await playPromise;
                    onPlaySuccess(track);
                }
            } catch (err) {
                console.warn('Play failed:', err.message);
                onPlayError(track, err);
            }
        }

        function onPlaySuccess(track) {
            playerReady = true;
            const name = trackName(track);
            updateHaloText(name);
            $('#bar-title').innerText = name;
            $('#bar-meta').innerText = t('nowPlaying');
            $('#play-btn').innerText = '⏸';
            domHalo.style.animationPlayState = 'running';
            domBar.classList.add('visible');

            // iOS 处理
            if (isIOS) {
                domVolSlider.style.display = 'none';
                domIosHint.style.display = 'block';
            } else {
                domVolSlider.style.display = '';
                domIosHint.style.display = 'none';
                player.volume = parseFloat(domVolSlider.value);
            }

            // 持久化最后播放曲目
            store.set('lastTrack', track.p);
            store.set('type', curType);

            refreshListPlayingState();
        }

        function onPlayError(track, err) {
            playerReady = false;
            updateHaloText(t('error'));
            toast(t('error'));
            $('#play-btn').innerText = '⏵';
            domHalo.style.animationPlayState = 'paused';
            console.error('Audio load error for', track.p, err);
        }

        function updateHaloText(msg, isTrackName = true) {
            const el = $('#halo-text');
            el.innerHTML = isTrackName
                ? `<div style="font-size:14px;opacity:0.7;line-height:1.6">${msg}</div>`
                : `<div class="loading-indicator">
                    <span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>
                   </div>
                   <div style="font-size:12px;margin-top:12px;opacity:0.5;">${msg}</div>`;
        }

        // ---- 播放/暂停 ----
        function togglePlay() {
            if (!curTrack) return;

            if (player.paused) {
                player.play().then(() => {
                    $('#play-btn').innerText = '⏸';
                    domHalo.style.animationPlayState = 'running';
                    updateHaloText(trackName(curTrack));
                    refreshListPlayingState();
                }).catch(err => {
                    console.warn('Resume failed:', err);
                });
            } else {
                player.pause();
                $('#play-btn').innerText = '⏵';
                domHalo.style.animationPlayState = 'paused';
                refreshListPlayingState();
            }
        }

        // ---- 音量 ----
        function setVolume(val) {
            const v = parseFloat(val);
            if (!isIOS) {
                player.volume = v;
            }
            store.set('volume', v);
        }

        // ---- 进度条 ----
        function formatTime(seconds) {
            if (!isFinite(seconds) || seconds < 0) return '00:00';
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        function updateProgress() {
            if (!player.duration || !isFinite(player.duration)) {
                domProgressFill.style.width = '0%';
                domTimeDuration.innerText = '00:00';
                return;
            }
            const pct = (player.currentTime / player.duration) * 100;
            domProgressFill.style.width = pct + '%';
            domTimeCurrent.innerText = formatTime(player.currentTime);
            domTimeDuration.innerText = formatTime(player.duration);

            // 缓冲进度
            if (player.buffered.length > 0) {
                const buffered = player.buffered.end(player.buffered.length - 1);
                const bufPct = (buffered / player.duration) * 100;
                domProgressBuffered.style.width = bufPct + '%';
            }
        }

        let isSeeking = false;

        function getSeekPercent(e) {
            const rect = domProgressContainer.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            return Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
        }

        function seekStart(e) {
            isSeeking = true;
            if (player.duration) {
                const pct = getSeekPercent(e);
                player.currentTime = pct * player.duration;
                updateProgress();
            }
            // 全局监听移动和释放
            document.addEventListener('mousemove', seekMove);
            document.addEventListener('mouseup', seekEnd);
            document.addEventListener('touchmove', seekMove);
            document.addEventListener('touchend', seekEnd);
        }

        function seekMove(e) {
            if (!isSeeking || !player.duration) return;
            const pct = getSeekPercent(e);
            player.currentTime = pct * player.duration;
            updateProgress();
        }

        function seekEnd() {
            isSeeking = false;
            document.removeEventListener('mousemove', seekMove);
            document.removeEventListener('mouseup', seekEnd);
            document.removeEventListener('touchmove', seekMove);
            document.removeEventListener('touchend', seekEnd);
        }

        function seekHover(e) {
            if (isSeeking || !player.duration) return;
            const pct = getSeekPercent(e);
            const time = pct * player.duration;
            domProgressHover.innerText = formatTime(time);
            domProgressHover.style.opacity = '1';
            domProgressHover.style.left = (pct * 100) + '%';
        }

        function seekHoverEnd() {
            if (isSeeking) return;
            domProgressHover.style.opacity = '0';
        }

        // ---- 睡眠定时器 ----
        let timerMinutes = 0;
        let timerSecondsLeft = 0;
        let timerInterval = null;
        let fadeOutInterval = null;

        function toggleTimerPopover() {
            const isOpen = domTimerPopover.classList.contains('show');
            domTimerPopover.classList.toggle('show', !isOpen);
            // 点击外部关闭
            if (!isOpen) {
                setTimeout(() => {
                    const closeHandler = (e) => {
                        if (!domTimerPopover.contains(e.target) && e.target !== domTimerBtn) {
                            domTimerPopover.classList.remove('show');
                            document.removeEventListener('click', closeHandler);
                        }
                    };
                    document.addEventListener('click', closeHandler);
                }, 50);
            }
        }

        function setTimer(minutes) {
            timerMinutes = minutes;
            domTimerPopover.classList.remove('show');

            // 高亮当前选项
            $$('.timer-option').forEach(opt => {
                opt.classList.toggle('active', parseInt(opt.dataset.min) === minutes);
            });

            // 清除旧定时器
            clearInterval(timerInterval);
            clearInterval(fadeOutInterval);
            timerInterval = null;
            fadeOutInterval = null;

            if (minutes === 0) {
                // 关闭定时
                timerSecondsLeft = 0;
                domTimerBtn.innerText = '⏳';
                domTimerBtn.classList.remove('active');
                return;
            }

            timerSecondsLeft = minutes * 60;
            domTimerBtn.classList.add('active');
            updateTimerDisplay();

            timerInterval = setInterval(() => {
                timerSecondsLeft--;
                updateTimerDisplay();

                // 最后 30 秒开始淡出
                if (timerSecondsLeft <= 30 && timerSecondsLeft > 0 && !fadeOutInterval) {
                    startFadeOut();
                }

                if (timerSecondsLeft <= 0) {
                    timerComplete();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const m = Math.floor(timerSecondsLeft / 60);
            const s = timerSecondsLeft % 60;
            domTimerBtn.innerText = '⏳ ' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        function startFadeOut() {
            const startVol = player.volume;
            const steps = 30;
            let step = 0;
            fadeOutInterval = setInterval(() => {
                step++;
                player.volume = Math.max(0, startVol * (1 - step / steps));
                if (step >= steps) {
                    clearInterval(fadeOutInterval);
                    fadeOutInterval = null;
                }
            }, 1000);
        }

        function timerComplete() {
            clearInterval(timerInterval);
            clearInterval(fadeOutInterval);
            timerInterval = null;
            fadeOutInterval = null;
            timerSecondsLeft = 0;

            player.pause();
            player.volume = parseFloat(domVolSlider.value); // 恢复音量
            $('#play-btn').innerText = '⏵';
            domHalo.style.animationPlayState = 'paused';
            domTimerBtn.innerText = '⏳';
            domTimerBtn.classList.remove('active');
            $$('.timer-option').forEach(opt => opt.classList.remove('active'));

            // 显示完成提示
            domTimerDoneText.innerText = curLang === 'zh' ? '时间到了，晚安。' : 'Time\'s up. Good night.';
            domTimerDone.classList.add('show');
        }

        function dismissTimerDone() {
            domTimerDone.classList.remove('show');
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen();

            player.loop = !player.loop;

        function toggleLang() {
            curLang = curLang === 'zh' ? 'en' : 'zh';
            store.set('lang', curLang);
            $('#lang-btn').innerText = curLang === 'zh' ? 'English' : '中文';
            $('#home-title').innerText = t('title');
            $('#home-slogan').innerText = t('slogan');
            $('#card-asmr').innerText = t('asmr');
            $('#card-nature').innerText = t('nature');
            $('#back-btn').innerText = t('back');
            $('#mode-seq').innerText = t('seq');
            $('#mode-rand').innerText = t('rand');
            $('#list-subtitle').innerText = t('listSubtitle');

            if (currentView === 'list') {
                $('#list-title').innerText = curType === 'asmr' ? t('asmr') : t('nature');
                renderList();
            }
            if (curTrack && currentView === 'player') {
                updateHaloText(trackName(curTrack));
                $('#bar-title').innerText = trackName(curTrack);
                $('#bar-meta').innerText = t('nowPlaying');
            }
        }

        // ---- 自动播放下一曲 ----
        player.addEventListener('ended', () => {
            if (player.loop) return;
            const next = getNextTrack();
            if (next) startTrack(next);
        });

        // ---- 音频错误恢复 ----
        player.addEventListener('error', () => {
            if (curTrack) {
                toast(t('error'));
                updateHaloText(t('error'));
                $('#play-btn').innerText = '⏵';
                domHalo.style.animationPlayState = 'paused';
            }
        });

        // ---- 进度更新 ----
        player.addEventListener('timeupdate', () => {
            if (!isSeeking) updateProgress();
        });

        player.addEventListener('loadedmetadata', () => {
            updateProgress();
        });

        // ---- 键盘快捷键 ----
        document.addEventListener('keydown', (e) => {
            // 防止在输入框中触发
            if (e.target.tagName === 'INPUT' || e.target.isContentEditable) return;

            switch (e.key) {
                case ' ':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'f':
                case 'F':
                    if (!e.ctrlKey && !e.metaKey && !e.altKey) {
                        e.preventDefault();
                        toggleFullscreen();
                    }
                    break;
                case 'Escape':
                    if (document.fullscreenElement) {
                        document.exitFullscreen();
                    } else if (currentView !== 'home') {
                        back();
                    }
                    break;
                case 'ArrowUp':
                    e.preventDefault();
                    domVolSlider.value = Math.min(1, parseFloat(domVolSlider.value) + 0.05);
                    setVolume(domVolSlider.value);
                    break;
                case 'ArrowDown':
                    e.preventDefault();
                    domVolSlider.value = Math.max(0, parseFloat(domVolSlider.value) - 0.05);
                    setVolume(domVolSlider.value);
                    break;
                case 'ArrowLeft':
                    if (e.ctrlKey || e.metaKey) break;
                    e.preventDefault();
                    player.currentTime = Math.max(0, player.currentTime - 10);
                    break;
                case 'ArrowRight':
                    if (e.ctrlKey || e.metaKey) break;
                    e.preventDefault();
                    player.currentTime = Math.min(player.duration || Infinity, player.currentTime + 10);
                    break;
            }
        });

        // ---- 粒子背景 ----
        function initParticles() {
            const canvas = $('#particles');
            const ctx = canvas.getContext('2d');
            let particles = [];
            const PARTICLE_COUNT = 60;
            let animId;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }

            class Particle {
                constructor() {
                    this.reset(true);
                }
                reset(initial = false) {
                    this.x = Math.random() * canvas.width;
                    this.y = initial ? Math.random() * canvas.height : canvas.height + 20;
                    this.size = Math.random() * 2 + 0.5;
                    this.speed = Math.random() * 0.3 + 0.1;
                    this.opacity = Math.random() * 0.4 + 0.1;
                    this.wobble = Math.random() * Math.PI * 2;
                    this.wobbleSpeed = Math.random() * 0.005 + 0.002;
                    this.wobbleAmp = Math.random() * 0.6 + 0.1;
                }
                update() {
                    this.y -= this.speed;
                    this.wobble += this.wobbleSpeed;
                    this.x += Math.sin(this.wobble) * this.wobbleAmp;
                    if (this.y < -20) this.reset();
                    if (this.x < -20) this.x = canvas.width + 20;
                    if (this.x > canvas.width + 20) this.x = -20;
                }
                draw(ctx) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(200,210,255,${this.opacity})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(ctx); });
                animId = requestAnimationFrame(animate);
            }

            resize();
            animate();

            window.addEventListener('resize', () => {
                resize();
                particles = [];
                for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());
            });

            // 页面不可见时暂停粒子动画以节省资源
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    cancelAnimationFrame(animId);
                } else {
                    animate();
                }
            });
        }

        /* === PWA: 初始化 —— 先加载数据，再启动 UI === */
        async function init() {
            // 第一步：加载音频数据（优先 tracks.json，失败则兜底）
            // 确保后续 renderList() 不会拿到空数据
            await loadTracks();

            initParticles();

            // 恢复保存的音量
            const savedVol = store.get('volume', 0.5);
            domVolSlider.value = savedVol;
            if (!isIOS) {
                player.volume = savedVol;
            } else {
                domVolSlider.style.display = 'none';
                domIosHint.style.display = 'block';
            }

            // 恢复循环状态
            if (store.get('loop', false)) {
                player.loop = true;
                $('#loop-btn').classList.add('active');
            }

            // 恢复语言
            if (curLang === 'en') {
                toggleLangUI();
            }

            // 恢复播放模式按钮状态
            $$('#mode-toggle .mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === playMode);
            });

            // 网络状态监听
            window.addEventListener('online', () => {
                domToast.classList.remove('show');
            });
            window.addEventListener('offline', () => {
                toast(curLang === 'zh' ? '网络已断开' : 'Network offline');
            });
        }

        // 仅更新 UI 不切状态（init 用）
        function toggleLangUI() {
            $('#lang-btn').innerText = '中文';
            $('#home-title').innerText = t('title');
            $('#home-slogan').innerText = t('slogan');
            $('#card-asmr').innerText = t('asmr');
            $('#card-nature').innerText = t('nature');
            $('#back-btn').innerText = t('back');
            $('#mode-seq').innerText = t('seq');
            $('#mode-rand').innerText = t('rand');
            $('#list-subtitle').innerText = t('listSubtitle');
        }

        /* ============================================================
           ADMIN: 管理后台方法
           ============================================================ */

        /* ADMIN: 显示密码登录浮层 */
        function showAdminLogin() {
            domAdminLoginOverlay.classList.add('show');
            domAdminLoginInput.value = '';
            domAdminLoginError.innerText = '';
            setTimeout(() => domAdminLoginInput.focus(), 100);
        }

        /* ADMIN: 隐藏密码登录浮层 */
        function hideAdminLogin() {
            domAdminLoginOverlay.classList.remove('show');
        }

        /* ADMIN: 密码输入框回车处理 */
        function adminLoginKeydown(event) {
            if (event.key === 'Enter') adminVerifyLogin();
            if (event.key === 'Escape') hideAdminLogin();
        }

        /* ADMIN: 点击浮层背景关闭 */
        function adminLoginOverlayClick(event) {
            if (event.target === domAdminLoginOverlay) hideAdminLogin();
        }

        /* ADMIN: 验证密码 —— 前端明文比对，验证状态存 sessionStorage */
        function adminVerifyLogin() {
            const input = domAdminLoginInput.value.trim();
            if (input === ADMIN_PASSWORD) {
                sessionStorage.setItem('melatonin_admin_auth', '1');
                domAdminLoginOverlay.classList.remove('show');
                domAdminLoginInput.value = '';
                domAdminLoginError.innerText = '';
                adminActiveTab = 'asmr';
                showView('admin');
                adminRenderTable();
            } else {
                domAdminLoginError.innerText = '密码错误，请重试';
                domAdminLoginInput.select();
            }
        }

        /* ADMIN: 检查是否已通过验证（sessionStorage） */
        function adminIsAuthed() {
            try { return sessionStorage.getItem('melatonin_admin_auth') === '1'; }
            catch { return false; }
        }

        /* ADMIN: 切换标签页 */
        function adminSwitchTab(tab) {
            adminActiveTab = tab;
            adminEditingRow = null;
            adminDeleteTarget = null;
            // 更新 tab 高亮
            document.querySelectorAll('.admin-tab').forEach(el => {
                el.classList.toggle('active', el.dataset.tab === tab);
            });
            adminRenderTable();
        }

        /* ADMIN: 渲染当前标签页的音频表格 */
        function adminRenderTable() {
            const list = db[adminActiveTab] || [];
            domAdminTbody.innerHTML = '';

            list.forEach((track, idx) => {
                const tr = document.createElement('tr');

                if (adminEditingRow === idx) {
                    /* ---- 编辑模式 ---- */
                    tr.innerHTML = `
                        <td class="col-num">${idx + 1}</td>
                        <td class="col-zh"><input type="text" id="admin-edit-zh" value="${escapeAttr(track.zh)}"></td>
                        <td class="col-en"><input type="text" id="admin-edit-en" value="${escapeAttr(track.en)}"></td>
                        <td class="col-path"><input type="text" id="admin-edit-p" value="${escapeAttr(track.p)}"></td>
                        <td class="col-actions">
                            <button class="admin-btn-small" onclick="App.adminSaveRow(${idx})">✅</button>
                            <button class="admin-btn-small danger" onclick="App.adminCancelEdit()">✕</button>
                        </td>`;
                } else {
                    /* ---- 展示模式 ---- */
                    tr.innerHTML = `
                        <td class="col-num">${idx + 1}</td>
                        <td class="col-zh">${escapeHTML(track.zh)}</td>
                        <td class="col-en">${escapeHTML(track.en)}</td>
                        <td class="col-path">${escapeHTML(track.p)}</td>
                        <td class="col-actions">
                            <button class="admin-btn-small" onclick="App.adminEditRow(${idx})">✏️</button>
                            <button class="admin-btn-small danger" onclick="App.adminDeleteRow(${idx})">🗑️</button>
                        </td>`;
                }
                domAdminTbody.appendChild(tr);
            });

            if (list.length === 0) {
                domAdminTbody.innerHTML = `<tr><td colspan="5" style="text-align:center;padding:24px;color:var(--text-faint);">
                    ${curLang === 'zh' ? '暂无音频，请添加' : 'No tracks yet. Add one below.'}
                </td></tr>`;
            }
        }

        /* ADMIN: 进入行编辑 */
        function adminEditRow(idx) {
            adminEditingRow = idx;
            adminRenderTable();
            // 聚焦第一个输入框
            setTimeout(() => {
                const inp = document.getElementById('admin-edit-zh');
                if (inp) { inp.focus(); inp.select(); }
            }, 50);
        }

        /* ADMIN: 保存行编辑 */
        function adminSaveRow(idx) {
            const zhEl = document.getElementById('admin-edit-zh');
            const enEl = document.getElementById('admin-edit-en');
            const pEl  = document.getElementById('admin-edit-p');
            if (!zhEl || !enEl || !pEl) return;

            const zhVal = zhEl.value.trim();
            const enVal = enEl.value.trim();
            const pVal  = pEl.value.trim();

            if (!zhVal || !enVal || !pVal) {
                alert(curLang === 'zh' ? '三个字段都不能为空' : 'All three fields are required.');
                return;
            }

            db[adminActiveTab][idx] = { zh: zhVal, en: enVal, p: pVal };
            adminEditingRow = null;
            adminRenderTable();
            console.log('[ADMIN] ✏️ 已更新:', zhVal);
        }

        /* ADMIN: 取消行编辑 */
        function adminCancelEdit() {
            adminEditingRow = null;
            adminRenderTable();
        }

        /* ADMIN: 删除确认 */
        function adminDeleteRow(idx) {
            adminDeleteTarget = idx;
            const track = db[adminActiveTab][idx];
            // 创建确认浮层
            const overlay = document.createElement('div');
            overlay.className = 'admin-delete-confirm show';
            overlay.id = 'admin-delete-overlay';
            overlay.innerHTML = `
                <div class="admin-delete-card" onclick="event.stopPropagation()">
                    <p class="admin-delete-text">${curLang === 'zh' ? '确认删除？' : 'Confirm delete?'}<br>
                    <span style="font-size:12px;color:var(--text-dim);">${escapeHTML(track.zh)} — ${escapeHTML(track.p)}</span></p>
                    <div class="admin-delete-actions">
                        <button class="admin-btn admin-btn-cancel" onclick="App.adminCancelDelete()">${curLang === 'zh' ? '取消' : 'Cancel'}</button>
                        <button class="admin-btn admin-btn-danger" onclick="App.adminConfirmDelete()">${curLang === 'zh' ? '确认删除' : 'Delete'}</button>
                    </div>
                </div>`;
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) adminCancelDelete();
            });
            document.body.appendChild(overlay);
        }

        /* ADMIN: 确认删除 */
        function adminConfirmDelete() {
            if (adminDeleteTarget === null) return;
            const removed = db[adminActiveTab].splice(adminDeleteTarget, 1);
            console.log('[ADMIN] 🗑 已删除:', removed[0]?.zh);
            adminDeleteTarget = null;
            adminCancelDelete(); // 移除确认浮层
            adminRenderTable();
        }

        /* ADMIN: 取消删除 */
        function adminCancelDelete() {
            adminDeleteTarget = null;
            const overlay = document.getElementById('admin-delete-overlay');
            if (overlay) overlay.remove();
        }

        /* ADMIN: 添加新音频 */
        function adminAddTrack() {
            const zhEl  = document.getElementById('admin-add-zh');
            const enEl  = document.getElementById('admin-add-en');
            const pathEl = document.getElementById('admin-add-path');
            if (!zhEl || !enEl || !pathEl) return;

            const zhVal = zhEl.value.trim();
            const enVal = enEl.value.trim();
            const pathVal = pathEl.value.trim();

            if (!zhVal || !enVal || !pathVal) {
                alert(curLang === 'zh' ? '请填写中文标题、英文标题和文件路径' : 'Please fill in all three fields.');
                return;
            }

            db[adminActiveTab].push({ zh: zhVal, en: enVal, p: pathVal });
            console.log('[ADMIN] ➕ 已添加:', zhVal, '→', pathVal);

            // 清空表单
            zhEl.value = '';
            enEl.value = '';
            pathEl.value = '';
            zhEl.focus();

            adminRenderTable();
        }

        /* ADMIN: 导出 tracks.json —— 格式化 JSON 到 textarea 并全选 */
        function adminExportJSON() {
            const json = JSON.stringify(db, null, 2);
            domAdminExportOut.value = json;
            domAdminExportOut.style.display = 'block';
            domAdminExportHint.style.display = 'block';
            domAdminExportOut.select();
            domAdminExportOut.scrollTop = 0;
            console.log('[ADMIN] 📋 JSON 已生成，长度:', json.length, '字符');
        }

        /* ADMIN: 从管理后台返回首页 */
        function backFromAdmin() {
            adminEditingRow = null;
            adminDeleteTarget = null;
            // 隐藏导出区域
            domAdminExportOut.style.display = 'none';
            domAdminExportHint.style.display = 'none';
            showView('home');
        }

        // ---- 公开 API ----
        return {
            enter,
            back,
            togglePlay,
            setVolume,
            toggleLoop,
            toggleFullscreen,
            setPlayMode,
            toggleLang,
            toggleTimerPopover,
            setTimer,
            dismissTimerDone,
            seekStart,
            seekHover,
            seekHoverEnd,
            seekEnd,
            init,
            /* ADMIN: 公开管理后台方法 */
            showAdminLogin,
            hideAdminLogin,
            adminLoginKeydown,
            adminLoginOverlayClick,
            adminVerifyLogin,
            adminSwitchTab,
            adminEditRow,
            adminSaveRow,
            adminCancelEdit,
            adminDeleteRow,
            adminConfirmDelete,
            adminCancelDelete,
            adminAddTrack,
            adminExportJSON,
            backFromAdmin
        };
    })();

    // ---- 启动 ----
    App.init();

    // ---- 处理 Standalone 模式下的滑动返回手势 ----
    document.addEventListener('gestureend', () => {});
    </script>

    <!-- ============================================================
         PWA: Service Worker 注册
         - 仅在 HTTPS 或 localhost 下注册（浏览器安全限制）
         - 注册成功后，SW 会拦截网络请求并执行缓存策略
         - 详见 sw.js 中的注释说明各策略
         ============================================================ -->
    <script>
    /* === PWA: 注册 Service Worker === */
    (function registerSW() {
        // 安全检查：Service Worker 需要 HTTPS 或 localhost
        if (!('serviceWorker' in navigator)) {
            console.log('[PWA] Service Worker 不受此浏览器支持');
            return;
        }

        // 页面加载完成后注册，避免与首屏渲染抢占带宽
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js', { scope: '/' })
                .then((registration) => {
                    console.log('[PWA] ✅ SW 注册成功，scope:', registration.scope);

                    // 监听 SW 更新 —— 有新版本时提示用户刷新
                    registration.addEventListener('updatefound', () => {
                        const newWorker = registration.installing;
                        if (!newWorker) return;
                        console.log('[PWA] 🔄 发现新版本 SW，正在安装…');
                        newWorker.addEventListener('statechange', () => {
                            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                // 新 SW 已就绪但旧 SW 还在控制页面 → 提示刷新
                                console.log('[PWA] 💡 新版本已就绪，刷新页面后生效');
                                // 静默更新，不打扰用户（助眠场景不宜弹窗）
                            }
                        });
                    });
                })
                .catch((err) => {
                    console.warn('[PWA] ⚠ SW 注册失败:', err.message);
                    // 常见失败原因：
                    // - 非 HTTPS 环境（localhost 除外）
                    // - 浏览器隐私模式限制
                    // - sw.js 语法错误
                });

            // === PWA: 监听 SW 消息（缓存统计、更新通知等） ===
            navigator.serviceWorker.addEventListener('message', (event) => {
                if (event.data && event.data.type === 'CACHE_STATS') {
                    console.log(
                        `[PWA] 📊 音频缓存: ${event.data.audioCount} 首, ` +
                        `${event.data.audioSizeMB}MB / ${event.data.maxSizeMB}MB 上限`
                    );
                }
            });
        });

        // === PWA: 接收来自 SW 的控制器变更通知 ===
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            console.log('[PWA] 🔄 SW 控制器已切换（新版本接管）');
        });
    })();
    </script>
